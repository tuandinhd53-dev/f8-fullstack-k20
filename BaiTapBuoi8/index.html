<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>grid</title>

        <!-- Reset Css -->
        <link rel="stylesheet" href="./asset/css/reset.css" />

        <!-- Embed Font -->

        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700&display=swap"
            rel="stylesheet"
        />

        <!-- Style Css -->
        <link rel="stylesheet" href="./asset/css/style.css" />
    </head>
    <body>
        <div class="container">
            <!-- Card Item 1 -->

            <section class="card card__item-burger">
                <img
                    src="https://files.f8.edu.vn/f8-prod/public-images/6a04c817be9c5.png"
                    alt="burger"
                />

                <div class="card__burger-content">
                    <p class="card__burger-title">Cheese Burger</p>

                    <p class="card__burger-desc">$4.99</p>
                </div>
            </section>

            <!-- Card Item 2 -->

            <section class="card card__item-phone">
                <img src="./asset/img/phone.png" alt="phone" />
            </section>
            <!-- Card Item 3 -->

            <section class="card card__item-restro">
                <div class="card__restro-content">
                    <p class="card__restro-title">📍Restro Beast Restaurant</p>

                    <p class="card__restro-desc">📍Restro Beast Restaurant</p>
                </div>
                <img 
                    src="https://files.f8.edu.vn/f8-prod/public-images/6a04c817be9c5.png"
                    alt="restro"
                />
            </section>

            <!-- Card Item 4 -->

            <section class="card card__item-menu">
                <p class="card__menu-title">Spacial Menu</p>
                <img src="./asset/img/menu.png" alt="menu" />
            </section>

            <!-- Card Item 5 -->

            <section class="card card__item-user">
                <img
                    src="https://files.f8.edu.vn/f8-prod/public-images/6a04c82e0ff1f.png"
                    alt="user"
                />

                <div class="card__user-content">
                    <p class="card__user-1 card__user-desc">🍔Choose dish</p>

                    <p class="card__user-2 card__user-desc">🛒Add to cart</p>
                    <p class="card__user-3 card__user-desc">💵🛵Pay & Track</p>
                </div>
            </section>

            <!-- Card Item 6 -->

            <section class="card card__item-selas">
                <div class="card__selas-content">
                    <p class="card__selas-title">Selas Analytics</p>

                    <p class="card__selas-desc">$44.500</p>
                </div>
                <img src="./asset/img/sales.png" alt="selas" />
            </section>

            <!-- Card Item 7 -->

            <section class="card card__item-oder">
                <img src="./asset/img/oder.png" alt="oder" />
            </section>

            <!-- Card Item 8 -->

            <section class="card card__item-ratings">
                <p class="card__ratings-title">Ratings⭐</p>

                <img src="./asset/img/ratings.png" alt="ratings" />
            </section>

            <!-- Card Item 9 -->

            <section class="card card__item-map">
                <img
                    src="https://files.f8.edu.vn/f8-prod/public-images/6a04c855de5ba.png"
                    alt="map"
                />
            </section>
        </div>
    </body>
</html>
